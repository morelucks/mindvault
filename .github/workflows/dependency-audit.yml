name: Dependency audit

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'server/**'
      - 'web/**'
      - 'packages/**'
      - 'mcp/**'
      - 'contract/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/dependency-audit.yml'
  workflow_dispatch:

jobs:
  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Report high-severity JS advisories
        run: pnpm audit --audit-level high

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/advisory-db
            contract/target
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('contract/Cargo.toml', 'contract/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
      - name: Report RustSec advisories
        working-directory: contract
        run: cargo audit --deny warnings

