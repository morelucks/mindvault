name: Contract CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-contract-wasm-${{ hashFiles('contract/Cargo.toml', 'contract/Cargo.lock', 'contract/contracts/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-contract-wasm-
            ${{ runner.os }}-cargo-

      - name: Build optimized wasm contract
        working-directory: contract
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-registry-wasm
          path: contract/target/wasm32-unknown-unknown/release/*.wasm
          if-no-files-found: error

      - name: Run tests
        working-directory: contract
        run: cargo test
