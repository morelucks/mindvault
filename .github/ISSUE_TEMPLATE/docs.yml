name: Documentation
description: Report missing, incorrect, or unclear documentation
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve the docs!
  - type: textarea
    id: description
    attributes:
      label: What needs to change?
      description: Describe what is missing, incorrect, or unclear.
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Affected page or file
      description: Link or file path (e.g. `docs/local-setup.md`).
    validations:
      required: false
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: What should the docs say instead?
